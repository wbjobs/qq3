<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪贴板同步 - Web端</title>
    <link rel="stylesheet" href="/web/css/style.css">
</head>
<body>
    <div id="app">
        <div id="auth-page" class="auth-container">
            <div class="auth-card">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="8" y="2" width="8" height="4" rx="1"/>
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <rect x="9" y="12" width="6" height="8" rx="1"/>
                        <path d="M9 16h6"/>
                    </svg>
                </div>
                <h1 class="app-title">剪贴板同步</h1>
                <p class="subtitle">跨设备实时剪贴板同步工具</p>

                <div class="tabs">
                    <button id="tab-login" class="tab-btn active" onclick="switchTab('login')">登录</button>
                    <button id="tab-register" class="tab-btn" onclick="switchTab('register')">注册</button>
                </div>

                <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn-primary">登 录</button>
                </form>

                <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="register-username" placeholder="3-50个字符" required minlength="3" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="register-password" placeholder="至少6位" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>邮箱（可选）</label>
                        <input type="email" id="register-email" placeholder="your@email.com">
                    </div>
                    <button type="submit" class="btn-primary">注 册</button>
                </form>
            </div>
        </div>

        <div id="main-page" class="main-container hidden">
            <header class="main-header">
                <div class="header-left">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="8" y="2" width="8" height="4" rx="1"/>
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <rect x="9" y="12" width="6" height="8" rx="1"/>
                        <path d="M9 16h6"/>
                    </svg>
                    <h1>剪贴板同步</h1>
                </div>
                <div class="header-right">
                    <span id="user-display" class="user-display"></span>
                    <span id="ws-status" class="ws-status disconnected">
                        <span class="status-dot"></span>
                        <span class="status-text">离线</span>
                    </span>
                    <button class="btn-icon" onclick="toggleSettingsPanel()" title="设置">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                    <button class="btn-icon" onclick="logout()" title="退出登录">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </header>

            <main class="main-content">
                <section class="settings-panel hidden" id="settings-panel">
                    <div class="section-header">
                        <h2>隐私与安全设置</h2>
                        <button class="btn-link" onclick="toggleSettingsPanel()">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                            关闭
                        </button>
                    </div>
                    <div class="settings-grid">
                        <div class="setting-item">
                            <div class="setting-info">
                                <div class="setting-title">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"/>
                                        <path d="M16.2 7.8l-2.7 7-3.7-1.2-2.7 7"/>
                                    </svg>
                                    静默模式
                                </div>
                                <div class="setting-desc">开启后，同步内容仅后端记录，不推送到其他设备</div>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="silent-mode-toggle" onchange="setSilentMode(this.checked)">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <div class="setting-info">
                                <div class="setting-title">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                    </svg>
                                    敏感词过滤
                                </div>
                                <div class="setting-desc">自动过滤手机号、身份证、银行卡等敏感信息，替换为***</div>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="filter-toggle" checked onchange="setFilterEnable(this.checked)">
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>

                    <div class="sensitive-section">
                        <div class="section-header" style="margin-bottom:12px;">
                            <h3 style="font-size:14px;">自定义敏感词管理</h3>
                            <button class="btn-link" onclick="loadSensitiveWords()">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="23 4 23 10 17 10"/>
                                    <polyline points="1 20 1 14 7 14"/>
                                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                                </svg>
                                刷新
                            </button>
                        </div>
                        <div class="sensitive-actions">
                            <input type="text" id="new-sensitive-word" placeholder="输入自定义敏感词（如：公司机密）" maxlength="50">
                            <button class="btn-primary" style="width:auto;padding:8px 16px;" onclick="addSensitiveWord()">添加</button>
                        </div>
                        <div class="default-patterns">
                            <div class="patterns-title">内置规则（始终生效）</div>
                            <div class="patterns-list">
                                <span class="pattern-tag">📱 手机号</span>
                                <span class="pattern-tag">🆔 身份证号</span>
                                <span class="pattern-tag">📧 邮箱地址</span>
                                <span class="pattern-tag">💳 银行卡号</span>
                            </div>
                        </div>
                        <div class="custom-words-title">自定义词库</div>
                        <div id="sensitive-words-list" class="sensitive-words-list"></div>
                    </div>
                </section>

                <section class="sync-section">
                    <div class="section-header">
                        <h2>发送内容</h2>
                        <div class="sync-status-tags">
                            <span class="mode-tag" id="silent-tag" style="display:none;">
                                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                </svg>
                                静默模式
                            </span>
                            <span class="device-tag">Web端</span>
                        </div>
                    </div>
                    <textarea id="clipboard-input" placeholder="在此输入或粘贴要同步的文本内容...（非中文将自动翻译）"></textarea>
                    <div id="filter-alert" class="filter-alert hidden"></div>
                    <div class="action-row">
                        <button class="btn-secondary" onclick="pasteFromClipboard()">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                                <rect x="8" y="2" width="8" height="4" rx="1"/>
                            </svg>
                            从剪贴板粘贴
                        </button>
                        <button class="btn-primary" onclick="syncClipboard()">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                            <span id="sync-btn-text">同步到所有设备</span>
                        </button>
                    </div>
                </section>

                <section class="history-section">
                    <div class="section-header">
                        <h2>同步历史</h2>
                        <button class="btn-link" onclick="loadHistory()">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"/>
                                <polyline points="1 20 1 14 7 14"/>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                            刷新
                        </button>
                    </div>
                    <div id="history-list" class="history-list"></div>
                </section>

                <section class="devices-section">
                    <div class="section-header">
                        <h2>已绑定设备</h2>
                    </div>
                    <div id="devices-list" class="devices-list"></div>
                </section>
            </main>
        </div>

        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="/web/js/app.js"></script>
</body>
</html>
