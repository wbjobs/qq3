<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#6366f1">
    <title>剪贴板同步 - 移动端</title>
    <link rel="stylesheet" href="/mobile/css/style.css">
</head>
<body>
    <div id="app">
        <div id="auth-page" class="mobile-auth">
            <div class="auth-content">
                <div class="mobile-logo">
                    <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="8" y="2" width="8" height="4" rx="1"/>
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <rect x="9" y="12" width="6" height="8" rx="1"/>
                        <path d="M9 16h6"/>
                    </svg>
                </div>
                <h1 class="mobile-title">剪贴板同步</h1>
                <p class="mobile-subtitle">手机电脑，一键互通</p>

                <div class="mobile-tabs">
                    <button id="tab-login" class="m-tab active" onclick="switchTab('login')">登录</button>
                    <button id="tab-register" class="m-tab" onclick="switchTab('register')">注册</button>
                </div>

                <form id="login-form" class="mobile-form" onsubmit="handleLogin(event)">
                    <div class="m-input-wrap">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="login-username" placeholder="用户名" required>
                    </div>
                    <div class="m-input-wrap">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="login-password" placeholder="密码" required>
                    </div>
                    <button type="submit" class="m-btn-primary">登 录</button>
                </form>

                <form id="register-form" class="mobile-form hidden" onsubmit="handleRegister(event)">
                    <div class="m-input-wrap">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="register-username" placeholder="用户名 (3-50字)" required minlength="3" maxlength="50">
                    </div>
                    <div class="m-input-wrap">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="register-password" placeholder="密码 (至少6位)" required minlength="6">
                    </div>
                    <div class="m-input-wrap">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input type="email" id="register-email" placeholder="邮箱 (可选)">
                    </div>
                    <button type="submit" class="m-btn-primary">注 册</button>
                </form>
            </div>
        </div>

        <div id="main-page" class="mobile-main hidden">
            <header class="m-header">
                <div class="m-header-left">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="8" y="2" width="8" height="4" rx="1"/>
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <rect x="9" y="12" width="6" height="8" rx="1"/>
                        <path d="M9 16h6"/>
                    </svg>
                    <span>剪贴板同步</span>
                </div>
                <div class="m-header-right">
                    <span id="ws-dot" class="ws-dot offline" title="离线"></span>
                    <button class="m-icon-btn" onclick="toggleSettingsPanel()" title="设置">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                    <button class="m-icon-btn" onclick="logout()" title="退出">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="m-user-bar">
                <span class="m-user-name" id="user-display"></span>
                <div class="m-bar-tags">
                    <span class="m-mode-tag" id="silent-tag" style="display:none;">
                        🔕 静默
                    </span>
                    <span class="m-device-label">📱 移动端</span>
                </div>
            </div>

            <main class="m-content">
                <section class="m-settings-panel m-section hidden" id="settings-panel">
                    <div class="m-section-title">
                        <span>隐私与安全</span>
                        <button class="m-mini-btn" onclick="toggleSettingsPanel()">收起</button>
                    </div>
                    <div class="m-setting-list">
                        <div class="m-setting-row">
                            <div class="m-setting-info">
                                <div class="m-setting-name">🔕 静默模式</div>
                                <div class="m-setting-desc">仅记录到服务器，不主动推送</div>
                            </div>
                            <label class="m-switch">
                                <input type="checkbox" id="silent-mode-toggle" onchange="setSilentMode(this.checked)">
                                <span class="m-slider"></span>
                            </label>
                        </div>
                        <div class="m-setting-row">
                            <div class="m-setting-info">
                                <div class="m-setting-name">🛡️ 敏感词过滤</div>
                                <div class="m-setting-desc">自动屏蔽手机号、身份证等</div>
                            </div>
                            <label class="m-switch">
                                <input type="checkbox" id="filter-toggle" checked onchange="setFilterEnable(this.checked)">
                                <span class="m-slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="m-sensitive-box">
                        <div class="m-sensitive-title">自定义敏感词</div>
                        <div class="m-sensitive-actions">
                            <input type="text" id="new-sensitive-word" placeholder="输入敏感词（如：公司机密）">
                            <button class="m-add-btn" onclick="addSensitiveWord()">添加</button>
                        </div>
                        <div class="m-builtin">
                            <span class="m-p-tag">📱手机号</span>
                            <span class="m-p-tag">🆔身份证</span>
                            <span class="m-p-tag">📧邮箱</span>
                            <span class="m-p-tag">💳银行卡</span>
                        </div>
                        <div id="sensitive-words-list" class="m-sensitive-list"></div>
                    </div>
                </section>

                <section class="m-section m-sync-card">
                    <div class="m-section-title">
                        <span>发送内容</span>
                    </div>
                    <textarea id="clipboard-input" placeholder="输入或粘贴要同步的文本&#10;非中文将自动翻译..."></textarea>
                    <div id="filter-alert" class="m-filter-alert hidden"></div>
                    <div class="m-actions">
                        <button class="m-btn-gray" onclick="pasteFromClipboard()">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                                <rect x="8" y="2" width="8" height="4" rx="1"/>
                            </svg>
                            粘贴
                        </button>
                        <button class="m-btn-send" onclick="syncClipboard()">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                            <span id="sync-btn-text">发送</span>
                        </button>
                    </div>
                </section>

                <nav class="m-tabs-nav">
                    <button class="m-nav-tab active" data-tab="history" onclick="switchNav('history')">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        历史
                    </button>
                    <button class="m-nav-tab" data-tab="devices" onclick="switchNav('devices')">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="5" y="2" width="14" height="20" rx="2"/>
                            <rect x="2" y="3" width="20" height="14" rx="2"/>
                        </svg>
                        设备
                    </button>
                </nav>

                <div id="tab-history" class="m-tab-content active">
                    <div class="m-refresh-bar">
                        <span class="m-count" id="history-count"></span>
                        <button class="m-refresh-btn" onclick="loadHistory()">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"/>
                                <polyline points="1 20 1 14 7 14"/>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                            刷新
                        </button>
                    </div>
                    <div id="history-list" class="m-history-list"></div>
                </div>

                <div id="tab-devices" class="m-tab-content">
                    <div id="devices-list" class="m-devices-list"></div>
                </div>
            </main>
        </div>

        <div id="toast" class="m-toast hidden"></div>
    </div>

    <script src="/mobile/js/app.js"></script>
</body>
</html>
